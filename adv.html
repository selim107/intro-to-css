<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intro to css...Advance Selectors</title>
    <style>
ol,ul,p,.spacial{
    background-color: coral;
    width: 50%;
}
.red{
    color: red;
}
.bold{
    font-weight: 900;
}
    </style>
</head>
<body>
    <h2>this is heading</h2>
    <h2 class="spacial">this is heading</h2>
    <h2>this is heading</h2>
    <p>Lorem ipsum dolor sit amet.</p>
    <ol>
        <li>item1</li>
        <li class="red bold highlight">item2</li>
        <li>item3</li>
        <li class="bold">item4</li>
        <li>item5</li>
    </ol>
    <ul>
        <li>item1</li>
        <li>item2</li>
        <li>item3</li>
        <li>item4</li>
        <li>item5</li>
    </ul>
</body>
</html>
